apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  generateName: mpi-nemo-benchmark-
  namespace: gcr-admin-test1
spec:
  queue: default
  minAvailable: 478
  plugins:
    ssh: []
    svc: []
    env: []
    mpi : ["--master=server", "--worker=client"]
  tasks:
    - name: server
      replicas: 1
      template:
        metadata:
          labels:
            app: hari-gcr-cluster-validation
            role: server
        spec:
          schedulerName: volcano
          restartPolicy: Never
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 256Gi
            - name: data
              persistentVolumeClaim:
                claimName: pvc-vast-gcr-admin-test1
            - name: sys
              hostPath:
                path: /sys
                type: Directory
          tolerations:
            - key: "rdma"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: hari-gcr-cluster-validation
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: server
              # Using the standard pytorch container (NeMo installation handled in script)
              image: nvcr.io/nvidia/pytorch:25.10-py3 
              env:
                - name: gcrnode
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
                - name: ALLPAIR_DEBUG
                  value: "1"
              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm
                - name: data
                  mountPath: /data
                - name: sys
                  mountPath: /sys
                  readOnly: true
              ports:
                - name: rdma
                  containerPort: 18515
              command: ["/bin/bash", "-lc"]
              args:
                - |
                  set -xeo pipefail
                  
                  # 1. Clone Repo
                  git clone https://github.com/IamNirmata/Cluster-Validation-Runbook.git /opt/Cluster-Validation-Runbook                 
                  
                  # 2. Source common setup
                  source /opt/Cluster-Validation-Runbook/scalability/env-nemo.sh

                  # 3. Source Server setup (Sets LOG_DIR)
                  source /opt/Cluster-Validation-Runbook/scalability/server-nemo.sh
                  
                  # 4. Start Logging to File
                  # This redirects all future commands' stdout/stderr to both console and file
                  exec > >(tee -a "${LOG_DIR}/console_output.log") 2>&1
                  echo "Logging started to ${LOG_DIR}"

                  # 5. Wait for workers
                  bash /opt/Cluster-Validation-Runbook/scalability/wait-for-ssh-nemo.sh
                  
                  # 6. Run NeMo Benchmark
                  echo "Starting NeMo Benchmark..."
                  cd /opt/Cluster-Validation-Runbook/scalability
                  chmod +x *.sh
                  
                  # Run the benchmark script
                  bash nemo-benchmark.sh
                  
                  echo "Benchmark finished. Logs are in ${LOG_DIR}"
                  sleep 3600
              resources:
                requests:
                  nvidia.com/gpu: "8"
                  cpu: "100"
                  memory: "1500Gi"
                  rdma/rdma_shared_device_a: "1"
                limits:
                  nvidia.com/gpu: "8"
                  cpu: "100"
                  memory: "1500Gi"
                  rdma/rdma_shared_device_a: "1"
    - name: client
      replicas: 477
      template:
        metadata:
          labels:
            app: hari-gcr-cluster-validation
            role: client
        spec:
          schedulerName: volcano
          restartPolicy: Never
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 256Gi
            - name: data
              persistentVolumeClaim:
                claimName: pvc-vast-gcr-admin-test1
            - name: sys
              hostPath:
                path: /sys
                type: Directory
          tolerations:
            - key: "rdma"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: hari-gcr-cluster-validation
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: client
              image: nvcr.io/nvidia/pytorch:25.10-py3
              env:
                - name: gcrnode
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm
                - name: data
                  mountPath: /data
                - name: sys
                  mountPath: /sys
                  readOnly: true
              ports:
                - name: rdma
                  containerPort: 18515
              command: ["/bin/bash", "-lc"]
              args:
                - |
                  set -xeo pipefail
                  git clone https://github.com/IamNirmata/Cluster-Validation-Runbook.git /opt/Cluster-Validation-Runbook                 
                  
                  # Source the renamed env file
                  source /opt/Cluster-Validation-Runbook/scalability/env-nemo.sh
                  
                  echo "Worker ready. Sleeping."
                  sleep 360000
              resources:
                requests:
                  nvidia.com/gpu: "8"
                  cpu: "100"
                  memory: "1500Gi"
                  rdma/rdma_shared_device_a: "1"
                limits:
                  nvidia.com/gpu: "8"
                  cpu: "100"
                  memory: "1500Gi"
                  rdma/rdma_shared_device_a: "1"