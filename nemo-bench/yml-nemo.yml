apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  generateName: mpi-nemo-benchmark-
  namespace: gcr-admin-test1
spec:
  queue: default
  minAvailable: 478
  plugins:
    ssh: []
    svc: []
    env: []
    mpi : ["--master=server", "--worker=client"]
  tasks:
    - name: server
      replicas: 1
      template:
        metadata:
          labels:
            app: hari-gcr-cluster-validation
            role: server
        spec:
          schedulerName: volcano
          restartPolicy: Never
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 256Gi
            - name: data
              persistentVolumeClaim:
                claimName: pvc-vast-gcr-admin-test1
            - name: sys
              hostPath:
                path: /sys
                type: Directory
          tolerations:
            - key: "rdma"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: hari-gcr-cluster-validation
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: server
              # Using the standard pytorch container (NeMo installation handled in script)
              image: nvcr.io/nvidia/pytorch:25.10-py3 
              env:
                - name: gcrnode
                  valueFrom:
                    fieldRef